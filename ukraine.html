<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukraine Evacuation Volunteers — Aaron MacCarley</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        html, body { overflow: hidden !important; height: 100%; }

        #project-bar {
            position: fixed;
            top: 56px; left: 0; right: 0;
            height: 36px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px;
            z-index: 490;
            background: rgba(0,0,0,0.85);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .proj-back {
            font-family: var(--mono);
            font-size: 9px; letter-spacing: 0.12em;
            color: rgba(255,255,255,0.4);
            cursor: none; transition: color 0.2s;
        }
        .proj-back:hover { color: #fff; }
        .proj-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: var(--mono);
            font-size: 9px; letter-spacing: 0.14em;
            color: #f0f0f0; white-space: nowrap; pointer-events: none;
        }
        .proj-count {
            font-family: var(--mono);
            font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4);
        }

        .scroll-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            width: 44px; height: 64px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 200; transition: opacity 0.4s ease;
        }
        .scroll-arrow::before {
            content: ''; width: 13px; height: 13px;
            border-right: 2px solid rgba(255,255,255,0.75);
            border-top: 2px solid rgba(255,255,255,0.75);
        }
        .scroll-arrow--left { left: 14px; }
        .scroll-arrow--left::before { transform: rotate(-135deg); }
        .scroll-arrow--right { right: 14px; }
        .scroll-arrow--right::before { transform: rotate(45deg); }
        .scroll-arrow.hidden { opacity: 0; }

        .gallery-wrap {
            position: fixed; inset: 0;
            overflow-x: auto; overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.18) transparent;
        }
        .gallery-wrap::-webkit-scrollbar { height: 2px; }
        .gallery-wrap::-webkit-scrollbar-track { background: transparent; }
        .gallery-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 1px; }

        .gallery-strip {
            display: flex; align-items: center;
            height: 100vh;
            padding: 92px 48px 0;
            gap: 6px;
        }
        .gallery-strip img {
            height: 66vh;
            width: auto; flex-shrink: 0; object-fit: contain; display: block;
            -webkit-user-drag: none;
        }

        @media (max-width: 768px) {
            body { overflow-y: auto !important; overflow-x: hidden !important; height: auto !important; }
            .gallery-wrap { position: static; overflow: visible; }
            .gallery-strip { flex-direction: column; height: auto; padding: 100px 0 0; gap: 4px; }
            .gallery-strip img { height: auto; width: 100vw; }
            #project-bar { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <div id="cursor" aria-hidden="true"></div>
    <div id="cursor-ring" aria-hidden="true"></div>

    <nav id="nav">
        <a href="index.html" class="nav-logo">AM</a>
        <div class="nav-links">
            <a href="index.html#work">FILM</a>
            <a href="photography.html">PHOTO</a>
            <a href="index.html#about">ABOUT</a>
            <a href="index.html#contact">CONTACT</a>
        </div>
        <div class="nav-right">
            <div class="nav-social">
                <a href="https://www.instagram.com/macgnarley/" target="_blank" rel="noopener noreferrer">IG</a>
                <a href="https://vimeo.com/macgnarley" target="_blank" rel="noopener noreferrer">VI</a>
                <a href="https://youtube.com/macgnarley" target="_blank" rel="noopener noreferrer">YT</a>
            </div>
            <button class="nav-burger" id="nav-burger" aria-label="Open menu">
                <span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <nav class="mobile-nav-links">
            <a href="index.html#work" class="mobile-link">FILM</a>
            <a href="photography.html" class="mobile-link">PHOTO</a>
            <a href="index.html#about" class="mobile-link">ABOUT</a>
            <a href="index.html#contact" class="mobile-link">CONTACT</a>
        </nav>
        <div class="mobile-social">
            <a href="https://www.instagram.com/macgnarley/" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
            <a href="https://vimeo.com/macgnarley" target="_blank" rel="noopener noreferrer">VIMEO</a>
            <a href="https://youtube.com/macgnarley" target="_blank" rel="noopener noreferrer">YOUTUBE</a>
            <a href="https://www.imdb.com/name/nm9268955" target="_blank" rel="noopener noreferrer">IMDB</a>
        </div>
    </div>

    <div id="project-bar">
        <a href="photography.html" class="proj-back">← PHOTOGRAPHY</a>
        <span class="proj-title">UKRAINE EVACUATION VOLUNTEERS</span>
        <span class="proj-count">7 PHOTOS</span>
    </div>

    <div id="arrow-left"  class="scroll-arrow scroll-arrow--left  hidden"></div>
    <div id="arrow-right" class="scroll-arrow scroll-arrow--right"></div>

    <div class="gallery-wrap" id="gallery-wrap">
        <div class="gallery-strip">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG.jpg" alt="" loading="eager" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG%20(1).jpg" alt="" loading="lazy" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG%20(2).jpg" alt="" loading="lazy" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG%20(4).jpg" alt="" loading="lazy" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG%20(6).jpg" alt="" loading="lazy" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/SITRSTILL_BASE%20UA_JPG%20(10).jpg" alt="" loading="lazy" draggable="false">
            <img src="Photo%20Portfolio%202026/Ukraine%20Evacuation%20Volunteers/Still%202024-07-31%20194050_6.28.1.png" alt="" loading="lazy" draggable="false">
        </div>
    </div>

    <script>
        const wrap = document.getElementById('gallery-wrap');

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            wrap.scrollLeft += e.deltaY + e.deltaX;
        }, { passive: false });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') wrap.scrollLeft += 300;
            if (e.key === 'ArrowLeft')  wrap.scrollLeft -= 300;
        });

        const cursorDot  = document.getElementById('cursor');
        const cursorRing = document.getElementById('cursor-ring');
        let mx = -100, my = -100, rx = -100, ry = -100;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursorDot.style.left = mx + 'px';
            cursorDot.style.top  = my + 'px';
        }, { passive: true });

        (function animRing() {
            rx += (mx - rx) * 0.13;
            ry += (my - ry) * 0.13;
            cursorRing.style.left = rx + 'px';
            cursorRing.style.top  = ry + 'px';
            requestAnimationFrame(animRing);
        })();

        document.addEventListener('mouseover', e => {
            if (e.target.closest('a, button')) document.body.classList.add('cursor-hover');
        });
        document.addEventListener('mouseout', e => {
            if (e.target.closest('a, button')) document.body.classList.remove('cursor-hover');
        });

        // Drag to scroll
        let isDragging = false, dragStartX = 0, dragScrollLeft = 0;
        wrap.addEventListener('mousedown', e => {
            isDragging = true;
            dragStartX = e.pageX;
            dragScrollLeft = wrap.scrollLeft;
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('mousemove', e => {
            if (!isDragging) return;
            wrap.scrollLeft = dragScrollLeft - (e.pageX - dragStartX);
        });

        // Arrow visibility
        const arrowLeft  = document.getElementById('arrow-left');
        const arrowRight = document.getElementById('arrow-right');
        function updateArrows() {
            arrowLeft.classList.toggle('hidden',  wrap.scrollLeft <= 4);
            arrowRight.classList.toggle('hidden', wrap.scrollLeft >= wrap.scrollWidth - wrap.clientWidth - 4);
        }
        wrap.addEventListener('scroll', updateArrows, { passive: true });
        window.addEventListener('resize', updateArrows);
        setTimeout(updateArrows, 100);

        // Mobile menu
        const burger     = document.getElementById('nav-burger');
        const mobileMenu = document.getElementById('mobile-menu');
        if (burger && mobileMenu) {
            burger.addEventListener('click', () => {
                const isOpen = mobileMenu.classList.toggle('open');
                burger.classList.toggle('open', isOpen);
            });
            mobileMenu.querySelectorAll('.mobile-link').forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.remove('open');
                    burger.classList.remove('open');
                });
            });
        }
    </script>

</body>
</html>
